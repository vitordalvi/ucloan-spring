spring:
  application:
    name: ucloan

  config:
    import: "optional:file:.env[.properties]"

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  #configuração do flyway
  flyway:
    enabled: true
    baseline-on-migrate: true

  # jpa/hibernate configs
  jpa:
    hibernate:
      ddl-auto: validate # hibernate só confere, quem vai criar a db vai ser o flyway
    show-sql: true
    properties:
      hibernate:
        format_sql: true